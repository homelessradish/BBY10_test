<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!-- Fonts -->
    <link
      href="https://fonts.googleapis.com/css?family=Darker Grotesque"
      rel="stylesheet"
    />
    <!-- Google Fonts-->
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200"
    />
    <!-- CSS -->
    <link rel="stylesheet" href="../css/saved_page.css" />
    <title>Saved Places</title>
  </head>
  <body class="saved-page">
    <header class="header">
      <div class="header__top">
        <button type="button" class="header__back-btn">
          <span class="material-symbols-outlined"> arrow_back_ios </span>
        </button>
        <h1 class="header__title">Saved Places</h1>
      </div>
      <div class="header__bottom">
        <button type="button" class="header__btn">Explore All</button>
        <button type="button" class="header__filter-btn">
          <span
            class="material-symbols-outlined material-symbols-outlined-filter"
          >
            page_info
          </span>
        </button>
      </div>
    </header>
    <main>
      <section class="section__saved-page" id="section__saved-page">
      </section>
    </main>
  </body>
  <script src="../js/saved_page.js"></script>
</html>
